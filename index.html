<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>維修料排列組合產生器</title>
    <!-- 引入 Tailwind CSS 進行樣式渲染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂卷軸樣式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- 標題區 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center space-x-4">
            <div class="bg-blue-100 p-3 rounded-xl text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-slate-800">維修料排列組合產生器 <span class="text-sm font-normal text-slate-500 ml-2">(Excel 專用版)</span></h1>
                <p class="text-slate-500 text-sm mt-1">勾選項目並點擊產生，可直接將表格複製貼上至 Excel 中。</p>
            </div>
        </div>

        <!-- 基本設定區 -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
            <h2 class="text-lg font-semibold mb-4 flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span>輸出格式設定</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">描述前綴 (Description Prefix)</label>
                    <input type="text" id="prefix-input" value="Replace " class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div class="flex items-center">
                    <label class="flex items-center space-x-3 cursor-pointer mt-5">
                        <input type="checkbox" id="skip-checkbox" checked class="w-5 h-5 rounded border-slate-300 text-blue-500 focus:ring-blue-400 accent-blue-500 cursor-pointer">
                        <span class="text-slate-700 font-medium select-none">結尾加上 "Skip this execution"</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 左側：必選項目 -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col h-full">
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-2 h-6 bg-red-400 rounded-full"></div>
                    <h2 class="text-lg font-semibold">必選項目 <span class="text-sm font-normal text-slate-500 ml-1">(自動配發前段 Task No)</span></h2>
                </div>
                
                <form id="req-form" class="flex mb-4 gap-2">
                    <input type="text" id="req-input" placeholder="輸入必選料號/名稱..." class="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent transition-all">
                    <button type="submit" id="req-submit" disabled class="bg-slate-800 hover:bg-slate-700 disabled:bg-slate-300 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    </button>
                </form>

                <div id="req-list" class="flex-1 overflow-y-auto max-h-48 pr-2 space-y-2">
                    <!-- 動態產生必選項目 -->
                </div>
            </div>

            <!-- 右側：情境項目 -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col h-full">
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-2 h-6 bg-blue-400 rounded-full"></div>
                    <h2 class="text-lg font-semibold">情境項目 <span class="text-sm font-normal text-slate-500 ml-1">(自動配發後段 Task No)</span></h2>
                </div>
                
                <form id="sit-form" class="flex mb-4 gap-2">
                    <input type="text" id="sit-input" placeholder="輸入情境料號/名稱..." class="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
                    <button type="submit" id="sit-submit" disabled class="bg-slate-800 hover:bg-slate-700 disabled:bg-slate-300 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    </button>
                </form>

                <div id="sit-list" class="flex-1 overflow-y-auto max-h-48 pr-2 space-y-2">
                    <!-- 動態產生情境項目 -->
                </div>
            </div>
        </div>

        <!-- 執行按鈕 -->
        <div class="flex justify-center py-2">
            <button id="generate-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-200 hover:shadow-blue-300 transition-all transform hover:-translate-y-0.5 flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="7" cy="17" r="3"/></svg>
                <span>一鍵產生表格</span>
            </button>
        </div>

        <!-- 結果顯示區 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 p-4 px-6 flex items-center justify-between">
                <h2 class="text-lg font-semibold flex items-center space-x-2">
                    <span>產生結果</span>
                    <span id="results-count" class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded-full">
                        共 0 列資料
                    </span>
                </h2>
                <button id="copy-btn" disabled class="flex items-center space-x-2 px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-blue-50 border border-blue-200 text-blue-700 hover:bg-blue-100 hover:text-blue-800 disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-white disabled:border-slate-200 disabled:text-slate-400">
                    <span id="copy-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    </span>
                    <span id="copy-text" class="font-bold">一鍵複製 (可直接貼上 Excel)</span>
                </button>
            </div>
            
            <div class="bg-white overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 text-sm">
                    <thead class="bg-slate-100">
                        <tr>
                            <th scope="col" class="px-4 py-3 text-center font-bold text-slate-700 border-x border-slate-200">ITEM</th>
                            <th scope="col" class="px-4 py-3 text-left font-bold text-slate-700 border-r border-slate-200">DESCRIPTION</th>
                            <th scope="col" class="px-4 py-3 text-center font-bold text-slate-700 border-r border-slate-200">RMA_TASK_NO</th>
                        </tr>
                    </thead>
                    <tbody id="results-container" class="divide-y divide-slate-200 bg-white">
                        <!-- 動態產生結果 -->
                        <tr>
                            <td colspan="3" class="px-6 py-8 text-center text-slate-500">
                                請先勾選上方的項目，然後點擊「產生」按鈕
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        // --- 狀態管理 (預設代入圖片中的資料) ---
        let requiredItems = [
            { id: 'r1', text: 'LCD Cover(A part)', checked: true },
        ];
        let situationalItems = [
            { id: 's1', text: 'LCD BEZEL', checked: true },
            { id: 's2', text: 'HINGE', checked: true },
            { id: 's3', text: 'LCD PANEL', checked: true },
        ];
        let results = [];

        // --- DOM 元素綁定 ---
        const reqList = document.getElementById('req-list');
        const sitList = document.getElementById('sit-list');
        const reqForm = document.getElementById('req-form');
        const sitForm = document.getElementById('sit-form');
        const reqInput = document.getElementById('req-input');
        const sitInput = document.getElementById('sit-input');
        const reqSubmit = document.getElementById('req-submit');
        const sitSubmit = document.getElementById('sit-submit');
        
        const prefixInput = document.getElementById('prefix-input');
        const skipCheckbox = document.getElementById('skip-checkbox');

        const generateBtn = document.getElementById('generate-btn');
        const resultsContainer = document.getElementById('results-container');
        const resultsCount = document.getElementById('results-count');
        const copyBtn = document.getElementById('copy-btn');
        const copyIcon = document.getElementById('copy-icon');
        const copyText = document.getElementById('copy-text');

        // SVG 圖示
        const trashIconSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`;
        const copySVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;
        const checkSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

        // --- 渲染畫面 ---
        function renderItems(items, container, type) {
            container.innerHTML = '';
            if (items.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.className = "text-slate-400 text-center py-4 text-sm";
                emptyMsg.textContent = `尚未加入任何${type === 'required' ? '必選' : '情境'}項目`;
                container.appendChild(emptyMsg);
                return;
            }

            items.forEach((item, index) => {
                const div = document.createElement('div');
                const isReq = type === 'required';
                const borderColor = item.checked ? (isReq ? 'border-red-200' : 'border-blue-200') : 'border-slate-100';
                const bgColor = item.checked ? (isReq ? 'bg-red-50/50' : 'bg-blue-50/50') : 'bg-slate-50';
                const textColor = item.checked ? 'text-slate-800 font-medium' : 'text-slate-500';
                const accentColor = isReq ? 'accent-red-500 text-red-500 focus:ring-red-400' : 'accent-blue-500 text-blue-500 focus:ring-blue-400';

                div.className = `flex items-center justify-between p-3 rounded-lg border transition-all ${borderColor} ${bgColor}`;
                
                div.innerHTML = `
                    <label class="flex items-center space-x-3 cursor-pointer flex-1">
                        <input type="checkbox" data-id="${item.id}" data-type="${type}" ${item.checked ? 'checked' : ''} class="w-5 h-5 rounded border-slate-300 cursor-pointer ${accentColor}">
                        <span class="${textColor}">${item.text}</span>
                    </label>
                    <button data-id="${item.id}" data-type="${type}" class="delete-btn text-slate-400 hover:text-red-500 p-1 transition-colors">
                        ${trashIconSVG}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function renderResults() {
            resultsCount.textContent = `共 ${results.length} 列資料`;
            
            if (results.length > 0) {
                copyBtn.disabled = false;
                let html = '';
                results.forEach((res) => {
                    html += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-2 border-x border-slate-200 text-center text-slate-700 whitespace-nowrap">${res.seq}</td>
                            <td class="px-4 py-2 border-r border-slate-200 text-slate-700">${res.desc}</td>
                            <td class="px-4 py-2 border-r border-slate-200 text-center text-slate-700 whitespace-nowrap">${res.taskNo}</td>
                        </tr>
                    `;
                });
                resultsContainer.innerHTML = html;
            } else {
                copyBtn.disabled = true;
                resultsContainer.innerHTML = `
                    <tr>
                        <td colspan="3" class="px-6 py-8 text-center text-slate-500">
                            請先勾選上方的項目，然後點擊「產生」按鈕
                        </td>
                    </tr>
                `;
            }
        }

        function updateAll() {
            renderItems(requiredItems, reqList, 'required');
            renderItems(situationalItems, sitList, 'situational');
        }

        // --- 核心邏輯 ---
        const getSubsets = (array) => {
            const result = [];
            const f = (prefix, arr) => {
                result.push(prefix);
                for (let i = 0; i < arr.length; i++) {
                    f([...prefix, arr[i]], arr.slice(i + 1));
                }
            };
            f([], array);
            // 依照長度排序，符合圖片中的情境遞增順序
            return result.sort((a, b) => a.length - b.length);
        };

        function generateCombinations() {
            const prefixVal = prefixInput.value;
            const addSkip = skipCheckbox.checked;

            const reqActive = requiredItems.filter(i => i.checked);
            const sitActive = situationalItems.filter(i => i.checked);

            if (reqActive.length === 0 && sitActive.length === 0) {
                results = [];
                renderResults();
                return;
            }

            // 1. 自動配發 Task No
            let currentTaskNo = 1;
            const assignedReq = reqActive.map(i => ({ ...i, taskNo: currentTaskNo++ }));
            const assignedSit = sitActive.map(i => ({ ...i, taskNo: currentTaskNo++ }));

            // 2. 取得情境的子集合
            const situationalSubsets = getSubsets(assignedSit);

            // 3. 組合並格式化字串
            results = situationalSubsets.map((subset, index) => {
                const fullCombo = [...assignedReq, ...subset];
                
                // 處理 DESCRIPTION 串接文法 (A, B and C)
                const texts = fullCombo.map(i => i.text);
                let desc = prefixVal;
                
                if (texts.length === 1) {
                    desc += texts[0];
                } else if (texts.length === 2) {
                    desc += texts[0] + ' and ' + texts[1];
                } else if (texts.length > 2) {
                    const last = texts[texts.length - 1];
                    const rest = texts.slice(0, -1);
                    desc += rest.join(', ') + ' and ' + last;
                }

                // 處理 RMA_TASK_NO 串接
                const taskNoStr = fullCombo.map(i => i.taskNo).join(',');

                return {
                    desc: desc,
                    taskNo: taskNoStr,
                    seq: index + 1
                };
            });

            // 4. 結尾是否加入 Skip execution
            if (addSkip) {
                results.push({
                    desc: "Skip this execution",
                    taskNo: "NULL",
                    seq: results.length + 1
                });
            }

            renderResults();
        }

        // --- 事件綁定 ---
        
        // 輸入框控制按鈕狀態
        reqInput.addEventListener('input', (e) => {
            reqSubmit.disabled = !e.target.value.trim();
        });
        sitInput.addEventListener('input', (e) => {
            sitSubmit.disabled = !e.target.value.trim();
        });

        // 監聽設定變更直接重新產生
        prefixInput.addEventListener('input', generateCombinations);
        skipCheckbox.addEventListener('change', generateCombinations);

        // 新增項目
        reqForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = reqInput.value.trim();
            if (val) {
                requiredItems.push({ id: Date.now().toString(), text: val, checked: true });
                reqInput.value = '';
                reqSubmit.disabled = true;
                updateAll();
                generateCombinations(); // 新增完自動產生
            }
        });

        sitForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const val = sitInput.value.trim();
            if (val) {
                situationalItems.push({ id: Date.now().toString(), text: val, checked: true });
                sitInput.value = '';
                sitSubmit.disabled = true;
                updateAll();
                generateCombinations(); // 新增完自動產生
            }
        });

        // 事件委派：處理勾選與刪除 (必選)
        reqList.addEventListener('change', (e) => {
            if (e.target.tagName === 'INPUT') {
                const id = e.target.dataset.id;
                requiredItems = requiredItems.map(item => item.id === id ? { ...item, checked: e.target.checked } : item);
                updateAll();
                generateCombinations();
            }
        });
        reqList.addEventListener('click', (e) => {
            const btn = e.target.closest('.delete-btn');
            if (btn) {
                const id = btn.dataset.id;
                requiredItems = requiredItems.filter(item => item.id !== id);
                updateAll();
                generateCombinations();
            }
        });

        // 事件委派：處理勾選與刪除 (情境)
        sitList.addEventListener('change', (e) => {
            if (e.target.tagName === 'INPUT') {
                const id = e.target.dataset.id;
                situationalItems = situationalItems.map(item => item.id === id ? { ...item, checked: e.target.checked } : item);
                updateAll();
                generateCombinations();
            }
        });
        sitList.addEventListener('click', (e) => {
            const btn = e.target.closest('.delete-btn');
            if (btn) {
                const id = btn.dataset.id;
                situationalItems = situationalItems.filter(item => item.id !== id);
                updateAll();
                generateCombinations();
            }
        });

        // 產生按鈕
        generateBtn.addEventListener('click', generateCombinations);

        // 複製按鈕 (使用 TSV 格式以支援 Excel 直接貼上)
        copyBtn.addEventListener('click', () => {
            if (results.length === 0) return;
            
            // 組合標題與資料行為 TSV (Tab-Separated Values)
            let tsvContent = "ITEM\tDESCRIPTION\tRMA_TASK_NO\n";
            results.forEach(res => {
                tsvContent += `${res.seq}\t${res.desc}\t${res.taskNo}\n`;
            });

            const textArea = document.createElement("textarea");
            textArea.value = tsvContent;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                // 變更按鈕狀態為成功
                copyBtn.classList.replace('bg-blue-50', 'bg-emerald-100');
                copyBtn.classList.replace('border-blue-200', 'border-emerald-200');
                copyBtn.classList.replace('text-blue-700', 'text-emerald-700');
                copyIcon.innerHTML = checkSVG;
                copyText.textContent = '已複製！請前往 Excel 貼上';
                
                setTimeout(() => {
                    copyBtn.classList.replace('bg-emerald-100', 'bg-blue-50');
                    copyBtn.classList.replace('border-emerald-200', 'border-blue-200');
                    copyBtn.classList.replace('text-emerald-700', 'text-blue-700');
                    copyIcon.innerHTML = copySVG;
                    copyText.textContent = '一鍵複製 (可直接貼上 Excel)';
                }, 3000);
            } catch (err) {
                console.error('Failed to copy', err);
                alert("複製失敗，請手動選取表格複製。");
            }
            document.body.removeChild(textArea);
        });

        // 初始化
        updateAll();
        generateCombinations();

    </script>
</body>
</html>
